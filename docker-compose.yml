# Local end-to-end stack:
#   mysql:8     -> db at localhost:3306
#   backend     -> Laravel API at http://localhost:8080  (proxied as /api by frontend)
#   frontend    -> SPA at http://localhost:5173
#
# Usage:
#   cp backend/.env.example backend/.env  # then set DB_* and APP_KEY (entrypoint will fill it)
#   docker compose up --build
#
# First boot only: set RUN_SEEDERS=true to seed demo data.
services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE:      ${DB_DATABASE:-vision_techno}
      MYSQL_USER:          ${DB_USERNAME:-vision}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-vision}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV:        ${APP_ENV:-production}
      APP_DEBUG:      ${APP_DEBUG:-false}
      APP_URL:        ${APP_URL:-http://localhost:8080}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost:5173}
      DB_CONNECTION:  mysql
      DB_HOST:        db
      DB_PORT:        3306
      DB_DATABASE:    ${DB_DATABASE:-vision_techno}
      DB_USERNAME:    ${DB_USERNAME:-vision}
      DB_PASSWORD:    ${DB_PASSWORD:-vision}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:5173,127.0.0.1:5173}
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS:    "${RUN_SEEDERS:-false}"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db-data:
