server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the SPA shell.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        try_files /index.html =404;
    }

    # SPA fallback so client-side routes work on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional reverse proxy for /api -> backend service.
    # Enable in production by setting BACKEND_UPSTREAM at runtime; we keep it
    # commented here because the SPA can also be served from a different
    # origin and rely on the Vite dev proxy locally.
    # location /api/ {
    #     proxy_pass         http://backend:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;
}
